<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JANU HOME FARM - Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #065f46; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Login -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm border border-emerald-100">
            <h2 class="text-2xl font-bold text-emerald-900 mb-6 text-center">🐷 JANU HOME FARM</h2>
            <input type="text" id="username" placeholder="Username (janu)" class="w-full p-3 border rounded-lg mb-4 outline-emerald-500">
            <input type="password" id="password" placeholder="Password (12345)" class="w-full p-3 border rounded-lg mb-4 outline-emerald-500">
            <button onclick="checkLogin()" class="w-full bg-emerald-700 text-white py-3 rounded-lg font-bold hover:bg-emerald-800 transition">MASUK</button>
        </div>
    </div>

    <!-- App -->
    <div id="main-app" class="hidden min-h-screen flex flex-col md:flex-row">
        <aside class="bg-emerald-900 text-white w-full md:w-64 p-6 flex flex-col shadow-xl">
            <h1 class="text-xl font-bold mb-8">🐷 JANU HOME FARM</h1>
            <nav class="space-y-2 flex-1">
                <button onclick="showTab('dashboard')" class="w-full text-left p-3 rounded-xl hover:bg-emerald-800 transition">📊 Dashboard</button>
                <button onclick="showTab('breeding')" class="w-full text-left p-3 rounded-xl hover:bg-emerald-800 transition">🐖 Indukan</button>
                <button onclick="showTab('anak-babi')" class="w-full text-left p-3 rounded-xl hover:bg-emerald-800 transition">👶 Anak Babi</button>
                <button onclick="showTab('pakan')" class="w-full text-left p-3 rounded-xl hover:bg-emerald-800 transition">🌾 Pakan</button>
                <button onclick="showTab('finance')" class="w-full text-left p-3 rounded-xl hover:bg-emerald-800 transition">💰 Keuangan</button>
                <button onclick="logout()" class="w-full text-left p-3 rounded-xl bg-red-900 mt-10 hover:bg-red-800 transition">🚪 Keluar</button>
            </nav>
        </aside>

        <main class="flex-1 p-6 md:p-10 overflow-y-auto">
            <div id="dashboard" class="tab-content active space-y-6">
                <h2 class="text-2xl font-bold text-gray-800">Dashboard</h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                    <div class="bg-white p-6 rounded-2xl shadow border-l-4 border-emerald-500">
                        <p class="text-gray-400 text-xs uppercase font-bold">Indukan</p>
                        <h3 id="stat-pigs" class="text-2xl font-bold">0</h3>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow border-l-4 border-blue-500">
                        <p class="text-gray-400 text-xs uppercase font-bold">Saldo</p>
                        <h3 id="stat-balance" class="text-2xl font-bold">Rp 0</h3>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow border-l-4 border-yellow-500">
                        <p class="text-gray-400 text-xs uppercase font-bold">Stok Pakan</p>
                        <h3 id="stat-pakan" class="text-2xl font-bold">0 kg</h3>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow border-l-4 border-purple-500">
                        <p class="text-gray-400 text-xs uppercase font-bold">Keuntungan</p>
                        <h3 id="stat-profit" class="text-2xl font-bold text-emerald-600">Rp 0</h3>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow">
                    <h3 class="font-bold text-lg mb-4">Statistik Populasi</h3>
                    <div class="max-w-xs mx-auto">
                        <canvas id="farmChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- Breeding Tab -->
            <div id="breeding" class="tab-content space-y-6">
                <h2 class="text-2xl font-bold text-gray-800">Manajemen Indukan</h2>
                <div class="bg-white p-6 rounded-2xl shadow">
                    <input type="text" id="pig-name" placeholder="Nama Induk" class="w-full p-3 border rounded-lg mb-2">
                    <input type="date" id="mating-date" class="w-full p-3 border rounded-lg mb-2">
                    <button onclick="addPig()" class="w-full bg-emerald-700 text-white p-3 rounded-lg font-bold hover:bg-emerald-800 transition">SIMPAN</button>
                </div>
                <div id="pig-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>

            <!-- Anak Babi Tab -->
            <div id="anak-babi" class="tab-content space-y-6">
                <h2 class="text-2xl font-bold text-gray-800">Data Anak Babi</h2>
                <div class="bg-white p-6 rounded-2xl shadow">
                    <input type="text" id="anak-induk-ref" placeholder="Nama Induk" class="w-full p-3 border rounded-lg mb-2">
                    <input type="date" id="anak-birth-date" class="w-full p-3 border rounded-lg mb-2">
                    <div class="flex gap-2 mb-2">
                        <input type="number" id="anak-male" placeholder="Jantan" class="w-full p-3 border rounded-lg">
                        <input type="number" id="anak-female" placeholder="Betina" class="w-full p-3 border rounded-lg">
                    </div>
                    <button onclick="addAnak()" class="w-full bg-emerald-700 text-white p-3 rounded-lg font-bold hover:bg-emerald-800 transition">SIMPAN KELAHIRAN</button>
                </div>
                <div id="anak-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>

            <!-- Pakan Tab -->
            <div id="pakan" class="tab-content space-y-6">
                <h2 class="text-2xl font-bold text-gray-800">Manajemen Pakan</h2>
                <div class="bg-white p-6 rounded-2xl shadow mb-6">
                    <input type="text" id="pakan-name" placeholder="Nama Pakan" class="w-full p-3 border rounded-lg mb-2">
                    <input type="number" id="pakan-qty" placeholder="Jumlah (Kg)" class="w-full p-3 border rounded-lg mb-2">
                    <input type="number" id="pakan-price" placeholder="Harga (Rp)" class="w-full p-3 border rounded-lg mb-2">
                    <button onclick="addPakan()" class="w-full bg-emerald-700 text-white p-3 rounded-lg font-bold hover:bg-emerald-800 transition">BELI & STOK</button>
                </div>
                <div id="pakan-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>

            <!-- Finance Tab -->
            <div id="finance" class="tab-content space-y-6">
                <h2 class="text-2xl font-bold text-gray-800">Keuangan</h2>
                <button onclick="exportCSV()" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-indigo-700 transition">Download Laporan (CSV)</button>
                <div id="fin-list" class="bg-white p-4 rounded-2xl shadow mt-4 text-sm"></div>
            </div>
        </main>
    </div>

    <!-- Modal Penjualan -->
    <div id="sell-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm">
            <h3 class="font-bold text-lg mb-4">Penjualan Anak Babi</h3>
            <input type="hidden" id="sell-id">
            <input type="number" id="sell-male" placeholder="Jual Jantan" class="w-full p-2 border rounded-lg mb-2">
            <input type="number" id="sell-female" placeholder="Jual Betina" class="w-full p-2 border rounded-lg mb-2">
            <input type="number" id="sell-price" placeholder="Harga Total (Rp)" class="w-full p-2 border rounded-lg mb-4">
            <div class="flex gap-2">
                <button onclick="closeModal()" class="flex-1 bg-gray-200 p-2 rounded-lg font-bold">Batal</button>
                <button onclick="confirmSale()" class="flex-1 bg-emerald-700 text-white p-2 rounded-lg font-bold">Konfirmasi</button>
            </div>
        </div>
    </div>

    <script>
        let state = { pigs: [], transactions: [], pakan: [], anakBabi: [] };
        let farmChart;

        try {
            const saved = localStorage.getItem('januFarmData');
            if(saved) state = JSON.parse(saved);
        } catch(e) { localStorage.removeItem('januFarmData'); }

        function checkLogin() { 
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if(u === 'janu' && p === '12345') {
                localStorage.setItem('isLoggedIn', 'true');
                document.getElementById('login-screen').classList.add('hidden'); 
                document.getElementById('main-app').classList.remove('hidden');
                renderAll();
            } else { alert('Username/Password salah!'); }
        }
        
        if(localStorage.getItem('isLoggedIn')) { 
            document.getElementById('login-screen').classList.add('hidden'); 
            document.getElementById('main-app').classList.remove('hidden'); 
            renderAll(); 
        }

        function showTab(t) { 
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active')); 
            document.getElementById(t).classList.add('active'); 
            if(t === 'dashboard') renderChart();
        }
        
        function saveData() { localStorage.setItem('januFarmData', JSON.stringify(state)); renderAll(); }

        function renderChart() {
            const ctx = document.getElementById('farmChart').getContext('2d');
            if(farmChart) farmChart.destroy();
            const totalAnak = state.anakBabi.reduce((acc, a) => acc + a.male + a.female, 0);
            farmChart = new Chart(ctx, {
                type: 'pie',
                data: { labels: ['Indukan', 'Anak Babi'], datasets: [{ data: [state.pigs.length, totalAnak], backgroundColor: ['#059669', '#3B82F6'] }] }
            });
        }

        function addPig() {
            state.pigs.push({ id: Date.now(), name: document.getElementById('pig-name').value, date: document.getElementById('mating-date').value });
            saveData();
        }

        function addAnak() {
            const bD = new Date(document.getElementById('anak-birth-date').value);
            const wD = new Date(bD); wD.setDate(wD.getDate() + 30);
            state.anakBabi.push({ 
                id: Date.now(), parent: document.getElementById('anak-induk-ref').value, birthDate: document.getElementById('anak-birth-date').value, 
                weaningDate: wD.toLocaleDateString(), male: parseInt(document.getElementById('anak-male').value) || 0, 
                female: parseInt(document.getElementById('anak-female').value) || 0, status: 'Aktif'
            });
            saveData();
        }

        function openModal(id) { document.getElementById('sell-id').value = id; document.getElementById('sell-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('sell-modal').classList.add('hidden'); }
        
        function confirmSale() {
            const id = parseInt(document.getElementById('sell-id').value);
            const a = state.anakBabi.find(x => x.id === id);
            const sM = parseInt(document.getElementById('sell-male').value) || 0;
            const sF = parseInt(document.getElementById('sell-female').value) || 0;
            const p = parseInt(document.getElementById('sell-price').value) || 0;
            
            a.male -= sM; a.female -= sF;
            state.transactions.push({ desc: `Penjualan Anak (${a.parent})`, amount: p, type: 'income' });
            if(a.male <= 0 && a.female <= 0) { a.status = 'Terjual'; a.sellDate = new Date().toLocaleDateString(); }
            saveData(); closeModal();
        }

        function addPakan() {
            state.pakan.push({ id: Date.now(), name: document.getElementById('pakan-name').value, qty: parseInt(document.getElementById('pakan-qty').value) });
            state.transactions.push({ desc: `Beli Pakan ${document.getElementById('pakan-name').value}`, amount: parseInt(document.getElementById('pakan-price').value), type: 'expense' });
            saveData();
        }

        function exportCSV() {
            let csv = "Keterangan,Tipe,Nominal\n" + state.transactions.map(t => `${t.desc},${t.type},${t.amount}`).join("\n");
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'Laporan_Keuangan_JanuFarm.csv'; a.click();
        }

        function renderAll() {
            document.getElementById('stat-pigs').innerText = state.pigs.length;
            const bal = state.transactions.reduce((acc, t) => t.type === 'income' ? acc + t.amount : acc - t.amount, 0);
            document.getElementById('stat-balance').innerText = 'Rp ' + bal.toLocaleString();
            document.getElementById('stat-profit').innerText = 'Rp ' + bal.toLocaleString();
            document.getElementById('stat-pakan').innerText = state.pakan.reduce((acc, p) => acc + p.qty, 0) + ' kg';

            document.getElementById('anak-list').innerHTML = state.anakBabi.map(a => `
                <div class="bg-white p-4 rounded-xl shadow ${a.status === 'Terjual' ? 'opacity-60 grayscale' : ''}">
                    <p class="font-bold">${a.parent}</p>
                    <p class="text-sm">Status: ${a.status} ${a.sellDate ? '('+a.sellDate+')' : ''}</p>
                    <p class="text-sm">J: ${a.male} | B: ${a.female}</p>
                    <p class="text-xs text-emerald-600 font-bold mt-1">Sapih: ${a.weaningDate}</p>
                    ${a.status === 'Aktif' ? `<button onclick="openModal(${a.id})" class="mt-2 bg-emerald-600 text-white px-4 py-1 rounded text-sm font-bold">JUAL</button>` : ''}
                </div>`).join('');
            document.getElementById('fin-list').innerHTML = state.transactions.map(t => `<div class="border-b p-2">${t.desc} - Rp ${t.amount.toLocaleString()} (${t.type})</div>`).join('');
            document.getElementById('pakan-list').innerHTML = state.pakan.map(p => `<div class="bg-white p-3 rounded shadow">${p.name} (${p.qty} kg)</div>`).join('');
            renderChart();
        }
        function logout() { localStorage.removeItem('isLoggedIn'); location.reload(); }
    </script>
</body>
</html>
