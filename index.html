<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>JANU HOME FARM</title>
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Janu Farm">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#065f46">
    
    <!-- Embedded Manifest -->
    <link rel="manifest" href='data:application/json;base64,ewogICJkZWZhdWx0X2xvY2FsZSI6ICJpZCIsCiAgIm5hbWUiOiAiSmFudSBIb21lIEZhcm0iLAogICJzaG9ydF9uYW1lIjogIkphbnVGYXJtIiwKICAic3RhcnRfdXJsIjogIi4vIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjZmZmZmZmIiwKICAidGhlbWVfY29sb3IiOiAiIzA2NWY0NiIsCiAgImljb25zIjogWwogICAgewogICAgICAic3JjIjogImh0dHBzOi8vY2RuLWljb25zLXBuZy5mbGF0aWNvbi5jb20vNTEyLzMwNjkvMzA2OTE3Ni5wbmciLAogICAgICAic2l6ZXMiOiAiMTkyeDE5MiIsCiAgICAgICJ0eXBlIjogImltYWdlL3BuZyIKICAgIH0KICBdCn0='>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <div id="login-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm border border-emerald-100">
            <h2 class="text-2xl font-bold text-emerald-900 mb-6 text-center">🐷 JANU HOME FARM</h2>
            <input type="text" id="username" placeholder="Nama Pengguna (janu)" class="w-full p-3 border rounded-lg mb-4 outline-emerald-500">
            <input type="password" id="password" placeholder="Kata Sandi (12345)" class="w-full p-3 border rounded-lg mb-4 outline-emerald-500">
            <button onclick="checkLogin()" class="w-full bg-emerald-700 text-white py-3 rounded-lg font-bold hover:bg-emerald-800 transition">MASUK</button>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen flex flex-col md:flex-row">
        <aside class="bg-emerald-900 text-white w-full md:w-64 p-6 flex flex-col shadow-xl">
            <div class="flex items-center mb-8 bg-emerald-800/30 p-3 rounded-xl border border-emerald-700/50 backdrop-blur-sm">
                <div class="w-10 h-10 bg-white rounded-lg flex items-center justify-center mr-3 shadow-lg">
                    <svg viewBox="0 0 24 24" class="w-6 h-6 text-emerald-900 fill-current" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 19h20L12 2z"/>
                    </svg>
                </div>
                <div>
                    <h1 class="text-lg font-bold tracking-tight">JANU FARM</h1>
                    <p class="text-xs text-emerald-400 font-medium">MANAGEMENT</p>
                </div>
            </div>
            
            <nav class="space-y-2 flex-1">
                <button onclick="showTab('dashboard')" class="w-full text-left p-3 rounded-xl hover:bg-emerald-800 transition">📊 Dasbor</button>
                <button onclick="showTab('breeding')" class="w-full text-left p-3 rounded-xl hover:bg-emerald-800 transition">🐖 Indukan</button>
                <button onclick="showTab('anak-babi')" class="w-full text-left p-3 rounded-xl hover:bg-emerald-800 transition">👶 Anak Babi</button>
                <button onclick="showTab('pakan')" class="w-full text-left p-3 rounded-xl hover:bg-emerald-800 transition">🌾 Pakan</button>
                <button onclick="showTab('finance')" class="w-full text-left p-3 rounded-xl hover:bg-emerald-800 transition">💰 Keuangan</button>
                <button onclick="logout()" class="w-full text-left p-3 rounded-xl bg-red-900 mt-10 hover:bg-red-800 transition">🚪 Keluar</button>
            </nav>
        </aside>

        <main class="flex-1 p-6 md:p-10 overflow-y-auto">
            <div id="dashboard" class="tab-content active space-y-6">
                <h2 class="text-2xl font-bold text-gray-800">Dasbor</h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                    <div class="bg-white p-6 rounded-2xl shadow border-l-4 border-emerald-500">
                        <p class="text-gray-400 text-xs uppercase font-bold">Indukan</p>
                        <h3 id="stat-pigs" class="text-2xl font-bold">0</h3>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow border-l-4 border-blue-500">
                        <p class="text-gray-400 text-xs uppercase font-bold">Saldo</p>
                        <h3 id="stat-balance" class="text-2xl font-bold">Rp 0</h3>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow border-l-4 border-yellow-500">
                        <p class="text-gray-400 text-xs uppercase font-bold">Stok Pakan</p>
                        <h3 id="stat-pakan" class="text-2xl font-bold">0 kg</h3>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow border-l-4 border-purple-500">
                        <p class="text-gray-400 text-xs uppercase font-bold">Keuntungan</p>
                        <h3 id="stat-profit" class="text-2xl font-bold text-emerald-600">Rp 0</h3>
                    </div>
                </div>
                
                <div class="bg-white p-6 rounded-2xl shadow">
                    <h3 class="font-bold text-gray-700 mb-4">Grafik Analisis Keuangan</h3>
                    <div class="h-64">
                        <canvas id="financeChart"></canvas>
                    </div>
                </div>
            </div>

            <div id="breeding" class="tab-content space-y-6">
                <h2 class="text-2xl font-bold text-gray-800">Manajemen Indukan</h2>
                <div class="bg-white p-6 rounded-2xl shadow">
                    <input type="text" id="pig-name" placeholder="Nama Induk" class="w-full p-3 border rounded-lg mb-2">
                    <label class="block text-sm text-gray-600 mb-1">Tanggal Kawin:</label>
                    <input type="date" id="mating-date" class="w-full p-3 border rounded-lg mb-2">
                    <button onclick="addPig()" class="w-full bg-emerald-700 text-white p-3 rounded-lg font-bold hover:bg-emerald-800 transition">SIMPAN</button>
                </div>
                <div id="pig-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>

            <div id="anak-babi" class="tab-content space-y-6">
                <h2 class="text-2xl font-bold text-gray-800">Manajemen Anak Babi</h2>
                <div class="bg-white p-6 rounded-2xl shadow">
                    <input type="text" id="anak-induk-ref" placeholder="Nama Induk" class="w-full p-3 border rounded-lg mb-2">
                    <input type="date" id="anak-birth-date" class="w-full p-3 border rounded-lg mb-2">
                    <div class="flex gap-2 mb-2">
                        <input type="number" id="anak-male" placeholder="Jumlah Jantan" class="w-full p-3 border rounded-lg">
                        <input type="number" id="anak-female" placeholder="Jumlah Betina" class="w-full p-3 border rounded-lg">
                    </div>
                    <button onclick="addAnak()" class="w-full bg-emerald-700 text-white p-3 rounded-lg font-bold hover:bg-emerald-800 transition">SIMPAN KELAHIRAN</button>
                </div>
                <div id="anak-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>

            <div id="pakan" class="tab-content space-y-6">
                <h2 class="text-2xl font-bold text-gray-800">Manajemen Pakan</h2>
                <div class="bg-white p-6 rounded-2xl shadow mb-6">
                    <input type="text" id="pakan-name" placeholder="Nama Pakan" class="w-full p-3 border rounded-lg mb-2">
                    <input type="number" id="pakan-qty" placeholder="Jumlah (Kg)" class="w-full p-3 border rounded-lg mb-2">
                    <input type="number" id="pakan-price" placeholder="Harga (Rp)" class="w-full p-3 border rounded-lg mb-2">
                    <button onclick="addPakan()" class="w-full bg-emerald-700 text-white p-3 rounded-lg font-bold hover:bg-emerald-800 transition">BELI & STOK</button>
                </div>
                <div id="pakan-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>

            <div id="finance" class="tab-content space-y-6">
                <div class="flex justify-between items-center">
                    <h2 class="text-2xl font-bold text-gray-800">Laporan Keuangan</h2>
                    <button onclick="exportFinancePDF()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-blue-700 transition">📥 Unduh PDF</button>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow">
                    <input type="text" id="fin-desc" placeholder="Keterangan (Contoh: Penjualan Babi)" class="w-full p-3 border rounded-lg mb-2">
                    <input type="number" id="fin-amount" placeholder="Nominal (Rp)" class="w-full p-3 border rounded-lg mb-2">
                    <select id="fin-type" class="w-full p-3 border rounded-lg mb-2">
                        <option value="income">Pemasukan</option>
                        <option value="expense">Pengeluaran</option>
                    </select>
                    <button onclick="addFinance()" class="w-full bg-emerald-700 text-white p-3 rounded-lg font-bold hover:bg-emerald-800 transition">TAMBAH TRANSAKSI</button>
                </div>
                <div id="fin-list" class="bg-white p-4 rounded-2xl shadow text-sm"></div>
            </div>
        </main>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl">
            <h3 id="modal-title" class="font-bold text-lg mb-4">Edit Data</h3>
            <div id="modal-body" class="space-y-3"></div>
            <div class="flex gap-2 mt-6">
                <button onclick="closeModal()" class="flex-1 bg-gray-200 p-2 rounded-lg font-bold">Batal</button>
                <button id="modal-confirm" class="flex-1 bg-emerald-700 text-white p-2 rounded-lg font-bold">Simpan</button>
            </div>
        </div>
    </div>

    <script>
        let state = { pigs: [], anakBabi: [], pakan: [], finance: [] };
        let financeChart = null;
        try { const saved = localStorage.getItem('januFarmData'); if(saved) state = JSON.parse(saved); } catch(e) {}

        function saveData() { localStorage.setItem('januFarmData', JSON.stringify(state)); renderAll(); }
        function showTab(t) { document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active')); document.getElementById(t).classList.add('active'); if(t === 'dashboard') updateChart(); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        function checkLogin() {
            if(document.getElementById('username').value === 'janu' && document.getElementById('password').value === '12345') {
                localStorage.setItem('isLoggedIn', 'true');
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                renderAll();
            } else { alert('Gagal Masuk! Periksa kredensial Anda.'); }
        }

        function logout() { localStorage.removeItem('isLoggedIn'); location.reload(); }

        // Core Functions
        function addPig() { state.pigs.push({ id: Date.now(), name: document.getElementById('pig-name').value, date: document.getElementById('mating-date').value }); saveData(); }
        function addAnak() { state.anakBabi.push({ id: Date.now(), parent: document.getElementById('anak-induk-ref').value, birthDate: document.getElementById('anak-birth-date').value, male: parseInt(document.getElementById('anak-male').value) || 0, female: parseInt(document.getElementById('anak-female').value) || 0 }); saveData(); }
        function addPakan() { const qty = parseInt(document.getElementById('pakan-qty').value); const price = parseInt(document.getElementById('pakan-price').value); state.pakan.push({ id: Date.now(), name: document.getElementById('pakan-name').value, qty, price }); state.finance.push({ id: Date.now(), desc: 'Beli Pakan: ' + document.getElementById('pakan-name').value, amount: price, type: 'expense' }); saveData(); }
        function addFinance() { state.finance.push({ id: Date.now(), desc: document.getElementById('fin-desc').value, amount: parseInt(document.getElementById('fin-amount').value), type: document.getElementById('fin-type').value }); saveData(); }

        function exportFinancePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(18);
            doc.text("Laporan Keuangan Janu Home Farm", 14, 20);
            doc.setFontSize(12);
            doc.text("Tanggal: " + new Date().toLocaleDateString(), 14, 30);
            let y = 40;
            doc.setFontSize(10);
            doc.text("Keterangan", 14, y);
            doc.text("Nominal", 150, y);
            doc.line(14, y + 2, 195, y + 2);
            y += 10;
            state.finance.forEach(f => {
                doc.text(f.desc, 14, y);
                const prefix = f.type === 'income' ? '+ ' : '- ';
                doc.text(prefix + f.amount.toLocaleString(), 150, y);
                y += 8;
            });
            doc.save("Laporan_Keuangan_Janu_Farm.pdf");
        }

        function deleteItem(list, id) { if(confirm('Hapus data ini?')) { state[list] = state[list].filter(i => i.id !== id); saveData(); } }
        
        function editItem(list, id) {
            const item = state[list].find(i => i.id === id);
            const modal = document.getElementById('modal');
            const body = document.getElementById('modal-body');
            const confirmBtn = document.getElementById('modal-confirm');
            modal.classList.remove('hidden');
            
            if(list === 'pigs') {
                body.innerHTML = `<input type="text" id="edit-name" value="${item.name}" class="w-full p-2 border rounded"><input type="date" id="edit-date" value="${item.date}" class="w-full p-2 border rounded">`;
                confirmBtn.onclick = () => { item.name = document.getElementById('edit-name').value; item.date = document.getElementById('edit-date').value; closeModal(); saveData(); };
            } else if(list === 'anakBabi') {
                body.innerHTML = `<input type="text" id="edit-parent" value="${item.parent}" class="w-full p-2 border rounded"><input type="date" id="edit-birth" value="${item.birthDate}" class="w-full p-2 border rounded"><input type="number" id="edit-male" value="${item.male}" class="w-full p-2 border rounded"><input type="number" id="edit-female" value="${item.female}" class="w-full p-2 border rounded">`;
                confirmBtn.onclick = () => { item.parent = document.getElementById('edit-parent').value; item.birthDate = document.getElementById('edit-birth').value; item.male = parseInt(document.getElementById('edit-male').value); item.female = parseInt(document.getElementById('edit-female').value); closeModal(); saveData(); };
            } else if(list === 'pakan') {
                body.innerHTML = `<input type="text" id="edit-pakan-name" value="${item.name}" class="w-full p-2 border rounded"><input type="number" id="edit-pakan-qty" value="${item.qty}" class="w-full p-2 border rounded">`;
                confirmBtn.onclick = () => { item.name = document.getElementById('edit-pakan-name').value; item.qty = parseInt(document.getElementById('edit-pakan-qty').value); closeModal(); saveData(); };
            }
        }

        function jualItem(list, id, name) {
            const price = prompt("Masukkan harga jual untuk " + name + ":");
            if(price) {
                state.finance.push({ id: Date.now(), desc: 'Penjualan: ' + name, amount: parseInt(price), type: 'income' });
                state[list] = state[list].filter(i => i.id !== id);
                saveData();
            }
        }

        function updateChart() {
            const ctx = document.getElementById('financeChart').getContext('2d');
            const income = state.finance.filter(i => i.type === 'income').reduce((a, b) => a + b.amount, 0);
            const expense = state.finance.filter(i => i.type === 'expense').reduce((a, b) => a + b.amount, 0);
            
            if (financeChart) financeChart.destroy();
            financeChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Pemasukan', 'Pengeluaran'],
                    datasets: [{
                        label: 'Total Rupiah',
                        data: [income, expense],
                        backgroundColor: ['#10b981', '#ef4444'],
                        borderRadius: 8,
                        barThickness: 60
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, grid: { color: '#f3f4f6' } }, x: { grid: { display: false } } }
                }
            });
        }

        function renderAll() {
            document.getElementById('stat-pigs').innerText = state.pigs.length;
            document.getElementById('stat-pakan').innerText = state.pakan.reduce((a, b) => a + b.qty, 0) + ' kg';
            const income = state.finance.filter(i => i.type === 'income').reduce((a, b) => a + b.amount, 0);
            const expense = state.finance.filter(i => i.type === 'expense').reduce((a, b) => a + b.amount, 0);
            document.getElementById('stat-balance').innerText = 'Rp ' + (income - expense).toLocaleString();
            document.getElementById('stat-profit').innerText = 'Rp ' + (income - expense).toLocaleString();
            updateChart();

            document.getElementById('pig-list').innerHTML = state.pigs.map(p => {
                const mating = new Date(p.date);
                const birth = new Date(mating);
                birth.setDate(birth.getDate() + 114);
                return `<div class="bg-white p-4 rounded-xl border flex flex-col justify-between gap-2 shadow-sm">
                    <div><b class="text-lg text-emerald-900">${p.name}</b><br><small class="text-gray-500">Kawin: ${p.date}</small><br><span class="text-emerald-700 font-bold text-sm">Est. Lahir: ${birth.toISOString().split('T')[0]}</span></div>
                    <div class="flex gap-2"><button onclick="editItem('pigs', ${p.id})" class="bg-gray-100 text-gray-600 px-3 py-1 rounded text-sm">Edit</button><button onclick="jualItem('pigs', ${p.id}, '${p.name}')" class="bg-emerald-600 text-white px-3 py-1 rounded text-sm flex-1">Jual</button><button onclick="deleteItem('pigs', ${p.id})" class="bg-red-50 text-red-600 px-3 py-1 rounded text-sm">Hapus</button></div>
                </div>`;
            }).join('');

            document.getElementById('anak-list').innerHTML = state.anakBabi.map(a => {
                const b = new Date(a.birthDate); b.setDate(b.getDate() + 35);
                return `<div class="bg-white p-4 rounded-xl border shadow-sm">
                    <b class="text-emerald-900">Induk: ${a.parent}</b><br><span class="text-gray-600">J: ${a.male} | B: ${a.female}</span><br><span class="text-orange-600 text-sm font-bold block mt-1">Est. Sapih: ${b.toISOString().split('T')[0]}</span>
                    <div class="flex gap-2 mt-3"><button onclick="editItem('anakBabi', ${a.id})" class="bg-gray-100 text-gray-600 px-3 py-1 rounded text-sm">Edit</button><button onclick="jualItem('anakBabi', ${a.id}, 'Anak Babi')" class="bg-emerald-600 text-white px-3 py-1 rounded text-sm flex-1">Jual</button><button onclick="deleteItem('anakBabi', ${a.id})" class="text-red-500 text-sm">Hapus</button></div>
                </div>`;
            }).join('');

            document.getElementById('pakan-list').innerHTML = state.pakan.map(p => `
                <div class="bg-white p-4 rounded-xl border flex justify-between items-center shadow-sm">
                    <div><b class="text-emerald-900">${p.name}</b><br>${p.qty} kg - Rp ${p.price.toLocaleString()}</div>
                    <div class="flex gap-2"><button onclick="editItem('pakan', ${p.id})" class="text-gray-500 text-sm">Edit</button><button onclick="deleteItem('pakan', ${p.id})" class="text-red-500 text-sm">Hapus</button></div>
                </div>
            `).join('');

            document.getElementById('fin-list').innerHTML = state.finance.map(f => `
                <div class="flex justify-between py-3 border-b border-gray-100"><span class="text-gray-700">${f.desc}</span><span class="font-bold ${f.type === 'income' ? 'text-emerald-600' : 'text-red-600'}">${f.type === 'income' ? '+' : '-'} Rp ${f.amount.toLocaleString()}</span></div>
            `).join('');
        }

        if(localStorage.getItem('isLoggedIn')) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            renderAll();
        }
    </script>
</body>
</html>
